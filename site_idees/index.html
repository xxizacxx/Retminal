<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>💡 Idées Retminal</title>
<style>
  :root{
    --bg:#0a0e0a; --bg2:#0f150f; --bar:#070a07;
    --green:#5df58a; --bright:#8affb0; --dim:#3c7a55;
    --cyan:#5fe3f5; --orange:#d8825f; --red:#f56d6d; --purple:#c08af5;
    --border:#1c3a26;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--green);
    font-family:Consolas,"Courier New",monospace;}
  body{padding:0 0 60px 0;}
  ::selection{background:var(--green);color:#000;}
  /* effet scanlines */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0),rgba(0,0,0,0) 2px,rgba(0,0,0,.15) 3px);}
  .bar{background:var(--bar);border-bottom:1px solid var(--border);
    padding:8px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;}
  .dot{width:13px;height:13px;border-radius:50%;display:inline-block;}
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .bartitle{flex:1;text-align:center;color:var(--dim);font-size:13px;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px;}
  h1{font-size:30px;color:var(--bright);text-shadow:0 0 12px rgba(93,245,138,.5);
    margin:28px 0 4px;}
  h1 .cur{animation:blink 1s steps(1) infinite;color:var(--green);}
  @keyframes blink{50%{opacity:0}}
  .sub{color:var(--dim);margin:0 0 18px;font-size:14px;}
  .tools{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:14px 0 6px;
    position:sticky;top:42px;background:var(--bg);padding:10px 0;z-index:40;}
  #search{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);
    color:var(--bright);padding:10px 14px;font-family:inherit;font-size:15px;border-radius:8px;outline:none;}
  #search:focus{border-color:var(--green);box-shadow:0 0 10px rgba(93,245,138,.3);}
  .btn{background:var(--bg2);border:1px solid var(--border);color:var(--green);
    padding:10px 14px;font-family:inherit;font-size:14px;border-radius:8px;cursor:pointer;
    transition:.15s;white-space:nowrap;}
  .btn:hover{border-color:var(--green);box-shadow:0 0 10px rgba(93,245,138,.3);color:var(--bright);}
  .stats{color:var(--dim);font-size:13px;margin:2px 0 18px;}
  .stats b{color:var(--green);}
  .cat{margin:30px 0 12px;font-size:20px;color:var(--bright);
    border-left:4px solid var(--green);padding-left:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    padding:14px 14px 14px 16px;position:relative;cursor:pointer;transition:.15s;overflow:hidden;}
  .card:hover{border-color:var(--green);transform:translateY(-3px);
    box-shadow:0 6px 18px rgba(0,0,0,.5),0 0 14px rgba(93,245,138,.15);}
  .card .emo{font-size:22px;}
  .card .t{color:var(--bright);font-weight:bold;font-size:15px;margin:6px 0 4px;}
  .card .d{color:var(--dim);font-size:13px;line-height:1.45;}
  .card.want{border-color:var(--orange);box-shadow:0 0 14px rgba(216,130,95,.25);}
  .star{position:absolute;top:8px;right:10px;font-size:18px;opacity:.35;transition:.15s;}
  .card:hover .star{opacity:.7;}
  .card.want .star{opacity:1;filter:drop-shadow(0 0 4px var(--orange));}
  .flash{animation:flash 1.1s ease;}
  @keyframes flash{0%,100%{box-shadow:none}30%{box-shadow:0 0 0 3px var(--green),0 0 24px var(--green)}}
  .copybar{position:fixed;bottom:0;left:0;right:0;background:var(--bar);
    border-top:1px solid var(--border);padding:10px 18px;display:flex;gap:12px;
    align-items:center;justify-content:center;z-index:60;}
  .copybar b{color:var(--orange);}
  .hint{color:var(--dim);font-size:12px;}
  .toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#000;padding:8px 16px;border-radius:8px;font-weight:bold;
    opacity:0;transition:.3s;z-index:80;}
  .toast.on{opacity:1;}
</style>
</head>
<body>
<div class="bar">
  <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
  <span class="bartitle">root@retminal — idées.html — localhost</span>
</div>
<div class="wrap">
  <h1>&gt; IDÉES POUR RETMINAL<span class="cur">█</span></h1>
  <p class="sub">Clique sur les idées que tu veux (⭐), puis copie ta liste en bas pour me la donner. Cherche avec la barre, ou tente une idée au hasard !</p>
  <div class="tools">
    <input id="search" placeholder="🔎 chercher une idée... (ex: serveur, couleur, jeu)">
    <button class="btn" onclick="randomIdea()">🎲 Au hasard</button>
    <button class="btn" onclick="clearWant()">🧹 Vider mes ⭐</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="list"></div>
</div>
<div class="copybar">
  <span class="hint">Tes choix sont gardés même si tu fermes la page.</span>
  <button class="btn" onclick="copyWant()">📋 Copier mes <b id="wc">0</b> idées ⭐</button>
</div>
<div class="toast" id="toast"></div>

<script>
const CATS = {
  fun:  {name:"🎨 Style & Fun"},
  web:  {name:"🌐 Web & VPS"},
  ia:   {name:"🤖 Claude & IA"},
  prod: {name:"⚙️ Productivité"},
  secu: {name:"🔒 Sécurité & Hacker"},
  jeux: {name:"🎮 Jeux & Mini-apps"},
  mc:   {name:"🟩 Minecraft"},
  sys:  {name:"🖥️ Système PC"},
};
const IDEAS = [
  ["fun","🌈","Thèmes de couleurs","Change tout le terminal : bleu, rouge, violet, matrix, rétro-ambre. `theme bleu`"],
  ["fun","🟩","Mode Matrix","Pluie de caractères verts qui tombent, comme dans les films. `matrix`"],
  ["fun","🅰️","Bannières ASCII","`banner SALUT` écrit ton texte en GROS en art ASCII."],
  ["fun","🔊","Sons de frappe","Petit 'clic' de clavier hacker quand tu tapes (activable)."],
  ["fun","👀","Mascotte animée","Clawd & Rety clignent des yeux et bougent un peu."],
  ["fun","🔤","Police au choix","Change la police d'écriture du terminal."],
  ["fun","🌌","Fond animé","Des étoiles / de l'ASCII qui bougent doucement derrière."],
  ["fun","⌨️","Effet machine à écrire","Le texte s'affiche lettre par lettre."],
  ["fun","🎉","Confettis","Petite explosion de confettis quand une commande réussit."],
  ["fun","🥚","Easter eggs","Des commandes secrètes cachées rien que pour toi."],
  ["fun","🎬","Mode film hacker","Du texte vert qui défile à toute vitesse, juste pour le style."],
  ["fun","⏳","Curseur perso","Choisis la forme, la couleur et le clignotement du curseur."],

  ["web","🟢","Commande sites","Liste tes domaines avec 🟢 en ligne / 🔴 hors ligne. Trop pratique !"],
  ["web","🚀","deploy un fichier","Envoie un fichier/dossier sur ton VPS en 1 commande (fini WinSCP)."],
  ["web","📜","logs en direct","Voir les logs du serveur en temps réel (visiteurs, erreurs...)."],
  ["web","✏️","Éditer un fichier VPS","`edit /var/www/index.php` ouvre un éditeur pour le serveur."],
  ["web","📊","Moniteur serveur","CPU / RAM / disque du VPS en temps réel, avec des barres."],
  ["web","📁","Explorateur de fichiers VPS","Navigue dans les dossiers du serveur en cliquant."],
  ["web","💾","backup","Sauvegarde ton site entier en 1 clic."],
  ["web","⚙️","Gérer les services","`restart nginx`, démarrer/arrêter apache, mysql..."],
  ["web","🔒","SSL en 1 commande","Installe un certificat HTTPS (Let's Encrypt) automatiquement."],
  ["web","🌐","Commande dns","Voir et changer tes DNS (Hostinger) depuis Retminal."],
  ["web","⬇️","download un fichier","Récupère un fichier depuis le VPS vers ton PC."],
  ["web","🖧","Multi-serveur","Lance UNE commande sur TOUS tes VPS d'un coup."],
  ["web","📈","ping joli","Un graphique animé de la vitesse de réponse d'un site."],

  ["ia","💬","Gestionnaire de conversations","Revoir et reprendre tes anciens chats avec Clawd (claude -r)."],
  ["ia","⚡","claude question rapide","Pose une question à Clawd sans entrer en mode complet."],
  ["ia","🧩","Lanceur d'agents","`claude marketing` installe le skill puis lance l'agent."],
  ["ia","🐛","Clawd explique l'erreur","Clique sur une erreur rouge → Clawd l'explique et la corrige."],
  ["ia","📝","Résumé du jour","Clawd te résume tout ce que tu as fait aujourd'hui."],
  ["ia","🎤","Mode vocal","Parle à Clawd avec ta voix (et il te répond)."],
  ["ia","🔧","Clawd répare mon code","En 1 commande, Clawd corrige le fichier que tu lui donnes."],

  ["prod","⚙️","Page de paramètres","Un menu pour gérer tes serveurs et alias SANS toucher au JSON."],
  ["prod","⭐","Commandes favorites","Épingle tes commandes préférées, clique pour les lancer."],
  ["prod","🔍","Recherche dans l'historique","Ctrl+R pour retrouver une commande déjà tapée."],
  ["prod","🧠","Autocomplétion intelligente","Des suggestions encore plus malines quand tu tapes."],
  ["prod","🗒️","Notes rapides","`note acheter un domaine` garde tes idées dans le terminal."],
  ["prod","✅","To-do list","Ta liste de choses à faire, directement dans Retminal."],
  ["prod","⏲️","Minuteur / chrono","`timer 5min` te prévient quand c'est fini."],
  ["prod","🧮","Calculatrice","`calc 12*8+3` te donne le résultat direct."],
  ["prod","⏰","Rappels","`rappel 14h faire mes devoirs` et ça te prévient."],
  ["prod","📋","Historique du presse-papier","Retrouve les derniers trucs que tu as copiés."],
  ["prod","⬛","Split-screen","Deux terminaux côte à côte dans la même fenêtre."],
  ["prod","🏷️","Renommer les onglets","Donne un nom à chaque onglet (ex: 'Mon site')."],

  ["secu","🔑","Générateur de mots de passe","Crée des mots de passe solides en 1 commande."],
  ["secu","🔐","Coffre-fort","Range tes mots de passe en sécurité (chiffrés)."],
  ["secu","🔢","Encoder / décoder","Base64, hash MD5/SHA, etc. en 1 commande."],
  ["secu","🛡️","Chiffrer un texte","Transforme un message en secret que toi seul peux lire."],
  ["secu","🚪","Scanner de ports","Vois quels ports sont ouverts sur TES serveurs."],
  ["secu","👤","Qui est connecté","Voir qui est branché sur ton VPS en ce moment."],

  ["jeux","🐍","Mini-jeux ASCII","Snake, Pong, devine le nombre... dans le terminal !"],
  ["jeux","❓","Quiz de code","Teste tes connaissances en programmation."],
  ["jeux","🕐","Horloge ASCII géante","L'heure affichée en GROS chiffres ASCII."],
  ["jeux","☀️","Météo","`weather Bordeaux` te donne le temps qu'il fait."],
  ["jeux","😂","Blague / fait du jour","Une blague ou un fait rigolo au démarrage."],
  ["jeux","🎲","Dé & pile/face","`roll` lance un dé, `flip` fait pile ou face."],

  ["mc","🟩","Gérer un serveur Minecraft","`mcserver` démarre/arrête ton serveur MC sur le VPS."],
  ["mc","🔨","Build de mod","Lance la compilation de ton mod Fabric/Forge en 1 commande."],
  ["mc","🎮","Qui joue ?","Voir les joueurs connectés à ton serveur Minecraft."],

  ["sys","🖥️","sysinfo","CPU, RAM, batterie, espace disque de ton PC."],
  ["sys","📸","screenshot","Capture ton écran avec une commande."],
  ["sys","🧹","Nettoyer le PC","Vide les fichiers temporaires inutiles."],
  ["sys","▶️","Lancer une app","`run notepad` ouvre une application de ton PC."],
  ["sys","🖱️","Clic-droit 'Ouvrir dans Retminal'","Depuis l'explorateur Windows, ouvre un dossier ici."],
];

const KEY="retminal_idees_want";
let want=new Set(JSON.parse(localStorage.getItem(KEY)||"[]"));

function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const list=document.getElementById("list");
  list.innerHTML="";
  let shown=0;
  for(const ck of Object.keys(CATS)){
    const items=IDEAS.filter(i=>i[0]===ck &&
      (!q || (i[2]+" "+i[3]).toLowerCase().includes(q)));
    if(!items.length) continue;
    const h=document.createElement("div");h.className="cat";h.textContent=CATS[ck].name;
    list.appendChild(h);
    const g=document.createElement("div");g.className="grid";
    for(const it of items){
      shown++;
      const card=document.createElement("div");
      card.className="card"+(want.has(it[2])?" want":"");
      card.dataset.t=it[2];
      card.innerHTML='<div class="star">'+(want.has(it[2])?"⭐":"☆")+'</div>'+
        '<div class="emo">'+it[1]+'</div>'+
        '<div class="t">'+it[2]+'</div>'+
        '<div class="d">'+it[3]+'</div>';
      card.onclick=()=>toggle(it[2]);
      g.appendChild(card);
    }
    list.appendChild(g);
  }
  document.getElementById("stats").innerHTML=
    "<b>"+shown+"</b> idées affichées · <b>"+IDEAS.length+"</b> au total · <b>"+want.size+"</b> choisies ⭐";
  document.getElementById("wc").textContent=want.size;
}
function toggle(t){
  if(want.has(t))want.delete(t);else want.add(t);
  localStorage.setItem(KEY,JSON.stringify([...want]));
  render();
}
function randomIdea(){
  document.getElementById("search").value="";
  render();
  const cards=[...document.querySelectorAll(".card")];
  if(!cards.length)return;
  const c=cards[Math.floor(Math.random()*cards.length)];
  c.scrollIntoView({behavior:"smooth",block:"center"});
  c.classList.remove("flash");void c.offsetWidth;c.classList.add("flash");
}
function clearWant(){
  if(!want.size)return;
  want.clear();localStorage.setItem(KEY,"[]");render();toast("Liste vidée");
}
function copyWant(){
  if(!want.size){toast("Choisis d'abord des idées ⭐");return;}
  const lines=IDEAS.filter(i=>want.has(i[2])).map(i=>"- "+i[1]+" "+i[2]);
  const txt="Mes idées Retminal préférées :\n"+lines.join("\n");
  navigator.clipboard.writeText(txt).then(()=>toast("Copié ! Colle-le à Claude 👍"))
    .catch(()=>{prompt("Copie ça à la main :",txt);});
}
let tt;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),1800);}
document.getElementById("search").addEventListener("input",render);
render();
</script>
</body>
</html>
